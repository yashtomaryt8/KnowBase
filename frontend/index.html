<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport: viewport-fit=cover handles iPhone/iPad notches & home bars ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / Web App ──────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf8f4" media="(prefers-color-scheme: light)" />

    <!-- iOS/PWA (makes it feel native when "Add to Home Screen") -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- apple-mobile-web-app-capable is kept intentionally for older iOS Safari PWA install support -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KnowBase" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Prevent iOS text inflation -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── SEO / Description ──────────────────────────────────────────────────── -->
    <meta
      name="description"
      content="KnowBase — your personal knowledge base for notes, topics, and ideas."
    />

    <!-- ── Favicon ────────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── Fonts ──────────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>KnowBase</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
